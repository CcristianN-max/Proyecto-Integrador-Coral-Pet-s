<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta - Coral Pet's</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Encabezado -->
    <header>
        <img src="Imagenes/Logo_Coral_Pets.png" alt="Logo Coral Pet's">

        <form>
            <label for="buscar">Buscar:</label>
            <input type="text" placeholder="Buscar productos">
            <button type="submit">Buscar</button>
        </form>

        <section class="parte-links">
            <a class="header-links" href="#">Carrito</a>
            <a class="header-links" href="cuenta.html">Cuenta</a>
        </section>
    </header>

    <!-- Menú -->
    <section class="menu-principal">
        <ul>
            <li><a href="#">Alimentos</a></li>
            <li><a href="#">Juguetes y accesorios</a></li>
            <li><a href="#">Belleza e higiene</a></li>
            <li><a href="#">Medicamentos</a></li>
        </ul>
    </section>

    <!-- Formulario Login -->
    <main>

        <section class="formulario-login">

            <h2>Iniciar Sesión</h2>

            <p>Ingresa tus datos para acceder a tu cuenta.</p>

            <form>

                <label for="correo">Correo Electrónico</label>
                <br>
                <input type="email" id="correo" required>
                <br><br>

                <label for="password">Contraseña</label>
                <br>
                <input type="password" id="password" required>
                <br><br>

                <button type="submit">Ingresar</button>

            </form>

        </section>

    </main>

    <!-- Footer -->
    <footer class="pie-pagina">

        <h2>Coral Pet's</h2>

        <section class="footer-links">
            <a href="index.html">Inicio</a>
            <a href="#">Tienda</a>
            <a href="#">Nosotros</a>
            <a href="contacto.html">Contacto</a>
        </section>

        <section class="footer-contacto">
            <p>Medellín - Colombia</p>
            <p>WhatsApp: 305 000 0000</p>
            <p>Instagram: @coralpets</p>
        </section>

    </footer>

</body>
</html>
